---
name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .github/workflows .yamllint
          config_file: .yamllint
          strict: true

      - name: actionlint
        uses: raven-actions/actionlint@v2

      - name: gitleaks (CLI — the v2 action requires a paid license)
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          /tmp/gitleaks --version
          /tmp/gitleaks detect --source . --redact --verbose --no-banner

      - name: commitlint (conventional commits)
        if: github.event_name == 'pull_request'
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: ${{ github.workspace }}/.github/commitlint.config.cjs

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (linux/amd64, no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: plug-zammad:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke check — image labels + binaries present
        run: |
          docker image inspect plug-zammad:ci-${{ github.sha }} \
            --format '{{ index .Config.Labels "org.opencontainers.image.title" }}' \
            | grep -q '^plug-zammad$'
          docker run --rm --entrypoint /bin/bash plug-zammad:ci-${{ github.sha }} -c \
            'test -d /opt/zammad && command -v ruby && command -v bundle'
